{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
      <div class="row justify-content-center mt-5">
        <div class="col-sm-8 col-md-5 col-lg-4">
          <div class="section-card">
            <div class="card-header">Sign In</div>
            <div class="card-body p-4">
              {% if sso_enabled %}
              <a class="btn btn-primary w-100 mb-3" href="{{ url_for('auth_login', next=request.args.get('next')) }}">
                Sign in with Microsoft
              </a>
              <div class="text-muted small mb-3 text-center">or use local account</div>
              {% endif %}
              <form method="post" action="{{ url_for('login') }}">
                <input type="hidden" name="next" value="{{ request.args.get('next', '') }}">
                <div class="mb-3">
                  <label class="form-label" for="username">Username</label>
                  <input type="text" name="username" id="username" class="form-control"
                         required autofocus autocomplete="username">
                </div>
                <div class="mb-3">
                  <label class="form-label" for="password">Password</label>
                  <input type="password" name="password" id="password" class="form-control"
                         required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-submit w-100">Sign In</button>
              </form>
            </div>
          </div>
        </div>
      </div>
{% endblock %}
