<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Map Lookups</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <div class="container py-4">
      <h1 class="mb-3">Map Fields to Lookup Lists</h1>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, msg in messages %}
            <div class="alert alert-{{ category }}">{{ msg }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="post">
        <div class="row">
          {% for label in labels %}
            <div class="col-md-6 mb-2">
              <label class="form-label">{{ label }}</label>
              <select name="{{ sanitize_name(label) }}" class="form-select">
                <option value="">(no mapping)</option>
                {% for lk in lookups %}
                  <option value="{{ lk }}" {% if mapping.get(label)==lk %}selected{% endif %}>{{ lk }}</option>
                {% endfor %}
              </select>
            </div>
          {% endfor %}
        </div>
        <div class="mt-3">
          <button class="btn btn-primary" type="submit">Save mappings</button>
          <a href="/" class="btn btn-secondary">Back to form</a>
        </div>
      </form>
    </div>
  </body>
</html>
