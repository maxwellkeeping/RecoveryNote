name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Black check
        run: black --check .

      - name: Ruff lint
        run: ruff check .

      - name: Mypy
        run: mypy --ignore-missing-imports app.py tests tools

      - name: Pytest
        run: pytest -q --ignore=tests/test_login_playwright.py

  playwright-e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: recoverynote
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d recoverynote"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/recoverynote
      E2E_BASE_URL: http://127.0.0.1:5000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install playwright

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Start app server
        run: |
          nohup python app.py > app.log 2>&1 &

      - name: Wait for app health
        run: |
          for i in {1..30}; do
            if curl -fsS "$E2E_BASE_URL/admin/login" > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "App did not become ready in time"
          cat app.log || true
          exit 1

      - name: Run Playwright tests
        run: pytest -q tests/test_login_playwright.py tests/test_agreement_id_playwright.py

      - name: Upload app log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: app-log
          path: app.log
