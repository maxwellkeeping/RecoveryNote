name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Black check
        run: black --check .

      - name: Ruff lint
        run: ruff check .

      - name: Mypy
        run: mypy --ignore-missing-imports app.py tests tools

      - name: Pytest
        run: pytest -q --ignore=tests/test_login_playwright.py
