name: Azure Slot Release

on:
  workflow_dispatch:
    inputs:
      promote_to_production:
        description: "Swap staging slot into production after smoke checks"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to staging slot
        uses: azure/webapps-deploy@v3
        with:
          app-name: recoverynote-gyjdtex5
          slot-name: staging

      - name: Smoke check login page
        run: |
          for i in {1..10}; do
            if curl -fsS "https://recoverynote-gyjdtex5-staging.azurewebsites.net/login" > /dev/null; then
              echo "Staging smoke check passed"
              exit 0
            fi
            echo "Waiting for slot warm-up..."
            sleep 10
          done
          echo "Staging smoke check failed"
          exit 1

  promote:
    if: ${{ github.event.inputs.promote_to_production == 'true' }}
    needs: deploy-staging
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Swap staging into production
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp deployment slot swap \
              --name recoverynote-gyjdtex5 \
              --resource-group rg-recoverynote-dev \
              --slot staging \
              --target-slot production
